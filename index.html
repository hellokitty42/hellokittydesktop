<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Kitty Desktop</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
        }


        /* Desktop Background */

        .desktop {
            width: 100vw;
            height: 100vh;

            background-image: url("desktopbg.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            padding: 25px;
        }


        /* Icon Column */

        .icon-column {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: flex-start;
        }


        /* Icon Links */

        .icon-button {
            display: block;
            text-decoration: none;
            cursor: pointer;

            transition: transform 0.15s ease;
        }


        .icon-button:hover {
            transform: scale(1.08);
        }


        .icon-button:active {
            transform: scale(0.95);
        }


        /* Icon Images */

        .icon-button img {
            width: 80px;
            height: auto;
            display: block;
        }


    </style>

</head>


<body>


<div class="desktop">


    <div class="icon-column">


        <!-- Solitaire -->

        <a href="html/solitaire.html" class="icon-button">
            <img src="icons/solitaireicon.png" alt="Solitaire">
        </a>



        <!-- VoxChat -->

        <a href="html/voxchat.html" class="icon-button">
            <img src="icons/voxchaticon.png" alt="VoxChat">
        </a>



        <!-- Photos -->

        <a href="html/photos.html" class="icon-button">
            <img src="icons/photosicon.png" alt="Photos">
        </a>



        <!-- Email -->

        <a href="html/email.html" class="icon-button">
            <img src="icons/emailicon.png" alt="Email">
        </a>



    </div>


</div>


</body>

</html>
