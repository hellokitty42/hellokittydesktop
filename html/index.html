<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Kitty Desktop</title>
<style>
* {
box-sizing: border-box;
margin: 0;
padding: 0;
}

body, html {
width: 100%;
height: 100%;
overflow: hidden;
font-family: sans-serif;
}

/* Desktop Background */
.desktop {
width: 100%;
height: 100%;
background-image: url('desktopbg.png');
background-size: cover;
background-position: center;
background-repeat: no-repeat;
padding: 20px;
}

/* Icon Grid Layout - Left Aligned Column */
.icon-column {
display: flex;
flex-direction: column;
gap: 25px;
align-items: flex-start;
width: max-content;
height: 100%;
}

/* Clickable Icon Button Styles */
.icon-button {
background: none;
border: none;
cursor: pointer;
padding: 5px;
display: block;
transition: transform 0.1s ease;
}

.icon-button:hover {
transform: scale(1.05);
}

.icon-button:active {
transform: scale(0.95);
}

.icon-button img {
display: block;
max-width: 80px; /* Adjust size as needed for your desktop layout */
height: auto;
}
</style>
</head>
<body>

<div class="desktop">
<div class="icon-column">

<!-- Solitaire -->
<a href="solitaire.html" class="icon-button">
<img src="solitaireicon.png" alt="Solitaire">
</a>

<!-- VoxChat -->
<a href="voxchat.html" class="icon-button">
<img src="voxchaticon.png" alt="VoxChat">
</a>

<!-- Photos -->
<a href="photos.html" class="icon-button">
<img src="photosicon.png" alt="Photos">
</a>

<!-- Email -->
<a href="email.html" class="icon-button">
<img src="emailicon.png" alt="Email">
</a>

</div>
</div>

</body>
</html>
